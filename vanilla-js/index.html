<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Todo App</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
</head>
<body>
  <div class="noise"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <main class="app">
    <header class="header">
      <div class="header-top">
        <div class="logo">
          <span class="logo-icon">✦</span>
          <span>TaskFlow</span>
        </div>
        <div class="stats">
          <span id="completedCount">0</span>/<span id="totalCount">0</span>
          <span class="stats-label">done</span>
        </div>
      </div>
      <h1 class="headline">Get things<br/><em>done.</em></h1>
    </header>

    <section class="input-section">
      <div class="input-wrapper">
        <input
          type="text"
          id="todoInput"
          class="todo-input"
          placeholder="What needs to be done?"
          maxlength="120"
          autocomplete="off"
        />
        <button id="addBtn" class="add-btn" title="Add Task">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
      <div id="errorMsg" class="error-msg" aria-live="polite"></div>
    </section>

    <section class="filter-section">
      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="pending">Pending</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>
      <button id="clearCompleted" class="clear-btn">Clear done</button>
    </section>

    <section class="list-section">
      <ul id="todoList" class="todo-list"></ul>
      <div id="emptyState" class="empty-state">
        <div class="empty-icon">◈</div>
        <p>No tasks here.<br/>Add one above!</p>
      </div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
